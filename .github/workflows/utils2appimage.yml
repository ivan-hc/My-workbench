name: Build and Test on Debian Unstable Containers (aarch64 & x86_64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        architecture: [x86_64, aarch64]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Set up QEMU for multi-platform
      uses: docker/setup-qemu-action@v4
      with:
        platforms: linux/amd64,linux/arm64

    - name: Build and run the script inside Debian Unstable container
      run: |
        # Pull Debian Unstable image based on the architecture
        docker pull --platform linux/${{ matrix.architecture }} debian:unstable

        # Run the container and install necessary packages, clearing apt cache and forcing installation
        docker run --platform linux/${{ matrix.architecture }} -d --name debian-container debian:unstable sh -c "
          apt-get update -y && \
          apt-get clean && \
          apt-get install -y curl bash 7zip binutils coreutils file findutils grep patchelf sed strace wget xz && \
          echo 'Packages installed successfully'"

        # Debugging: Check the container logs for apt-get installation output
        docker logs debian-container

        # Debugging: Check if curl is in the PATH
        docker exec debian-container sh -c 'echo $PATH'

        # Verify that curl is actually installed
        docker exec debian-container curl --version
        docker exec debian-container bash --version

        # Copy and run the script (adjust the script location)
        docker cp ./utils2appimage.sh debian-container:/utils2appimage.sh
        docker exec debian-container sh /utils2appimage.sh

        # Collect artifacts (e.g., a file generated by the script)
        docker cp debian-container:/path/to/artifact /tmp/artifact-${{ matrix.architecture }}.tar.gz

    - name: Upload artifacts
      uses: actions/upload-artifact@v4.4.0
      with:
        name: artifact-${{ matrix.architecture }}
        path: /tmp/artifact-${{ matrix.architecture }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        files: /tmp/artifact-*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
