name: utils2appimage

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up Docker Buildx for multiarch builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Set up QEMU for ARM emulation (needed for arm64 on x86 runners)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: linux/arm64

      # Run the script inside a minimal Debian container
      - name: Run utils2appimage.sh
        run: |
          IMAGE="debian:unstable"
          PLATFORM="linux/${{ matrix.arch }}"
          docker run --rm --platform $PLATFORM \
            -v $PWD:/workspace -w /workspace $IMAGE \
            bash -c "\
              apt-get update && apt-get install -y \
              binutils busybox coreutils curl file findutils grep \
              p7zip-full patchelf sed strace wget xz-utils \
              && chmod +x ./utils2appimage.sh \
              && ./utils2appimage.sh \
              && mkdir -p dist && cp ./*-static dist/"

      # Upload artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: output-${{ matrix.arch }}
          path: dist

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: output-x86_64
          path: dist

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: output-aarch64
          path: dist

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: get date
        run: |
          SNAPSHOT_TAG="$(date --utc +'%Y%m%d-%H%M%S')"
          echo SNAPSHOT_TAG="${SNAPSHOT_TAG}" >> "${GITHUB_ENV}"
        continue-on-error: false
      - name: release
        uses: softprops/action-gh-release@v2
        with:
            name: "Static binaries ${{env.SNAPSHOT_TAG}}"
            tag_name: "${{ env.SNAPSHOT_TAG}}"
            prerelease: false
            draft: false
            generate_release_notes: false
            make_latest: true
            files: |
              *-static
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
