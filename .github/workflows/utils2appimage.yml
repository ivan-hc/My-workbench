name: Build and Test on Alpine Containers (aarch64 & x86_64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        architecture: [x86_64, aarch64]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Set up QEMU for multi-platform
      uses: docker/setup-qemu-action@v4
      with:
        platforms: linux/amd64,linux/arm64

    - name: Build and run the script inside Alpine container
      run: |
        # Pull Alpine image based on the architecture
        docker pull --platform linux/${{ matrix.architecture }} alpine:edge

        # Run the container and install necessary packages
        docker run --platform linux/${{ matrix.architecture }} -d --name alpine-container alpine:latest sh -c "
          apk update && \
          apk add --no-cache 7zip bash binutils busybox coreutils curl file findutils grep patchelf sed strace wget xz"

        # Wait for the container to be ready and the packages to be installed
        docker exec alpine-container sh -c "curl --version && bash --version && echo 'All dependencies installed'"

        # Copy and run the script (adjust the script location)
        docker cp ./utils2appimage.sh alpine-container:/utils2appimage.sh
        docker exec alpine-container sh /utils2appimage.sh

        # Collect artifacts (e.g., a file generated by the script)
        docker cp alpine-container:/path/to/artifact /tmp/artifact-${{ matrix.architecture }}.tar.gz

    - name: Upload artifacts
      uses: actions/upload-artifact@v4.4.0
      with:
        name: artifact-${{ matrix.architecture }}
        path: /tmp/artifact-${{ matrix.architecture }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        files: /tmp/artifact-*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
