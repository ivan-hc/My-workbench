name: utils2appimage

on:
  push:
    tags:
      - 'v*'   # Trigger on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Docker Buildx for cross-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Run your script inside the appropriate container
      - name: Run script in container
        run: |
          IMAGE="ubuntu:22.04"
          if [ "${{ matrix.arch }}" == "aarch64" ]; then
            docker run --rm --platform linux/arm64 -v $PWD:/workspace -w /workspace $IMAGE bash ./utils2appimage.sh
          else
            docker run --rm --platform linux/amd64 -v $PWD:/workspace -w /workspace $IMAGE bash ./utils2appimage.sh
          fi

      # Upload artifacts for release
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: output-${{ matrix.arch }}
          path: ./output/*   # Adjust to where your script writes files

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download x86_64 artifact
        uses: actions/download-artifact@v3
        with:
          name: output-x86_64
          path: ./release/x86_64

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v3
        with:
          name: output-aarch64
          path: ./release/aarch64

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release/x86_64/*AppImage*
            ./release/aarch64/*AppImage*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
