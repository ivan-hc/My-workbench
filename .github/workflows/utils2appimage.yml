name: Build and Test on Ubuntu Containers (aarch64 & x86_64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        architecture: [x86_64, aarch64]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Set up QEMU for multi-platform
      uses: docker/setup-qemu-action@v4
      with:
        platforms: linux/amd64,linux/arm64

    - name: Build and run the script inside Ubuntu container
      run: |
        # Pull Ubuntu image based on the architecture
        docker pull --platform linux/${{ matrix.architecture }} ubuntu:latest

        # Run the container and install necessary packages
        docker run --platform linux/${{ matrix.architecture }} -d --name ubuntu-container ubuntu:latest sh -c "
          apt-get update && \
          apt-get install -y curl bash 7zip binutils coreutils file findutils grep patchelf sed strace wget xz"

        # Wait for the container to be ready and verify package installations
        docker exec ubuntu-container sh -c "curl --version && bash --version && echo 'All dependencies installed'"

        # Copy and run the script (adjust the script location)
        docker cp ./utils2appimage.sh ubuntu-container:/utils2appimage.sh
        docker exec ubuntu-container sh /utils2appimage.sh

        # Collect artifacts (e.g., a file generated by the script)
        docker cp ubuntu-container:/path/to/artifact /tmp/artifact-${{ matrix.architecture }}.tar.gz

    - name: Upload artifacts
      uses: actions/upload-artifact@v4.4.0
      with:
        name: artifact-${{ matrix.architecture }}
        path: /tmp/artifact-${{ matrix.architecture }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        files: /tmp/artifact-*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
