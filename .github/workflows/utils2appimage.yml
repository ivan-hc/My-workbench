name: utils2appimage

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        #arch: [x86_64, aarch64]
        arch: [x86_64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      #- name: Set up QEMU
      #  uses: docker/setup-qemu-action@v2
      #  with:
      #    platforms: arm64

      - name: Run script in container
        run: |
          IMAGE="debian:unstable"
          if [ "${{ matrix.arch }}" == "aarch64" ]; then
            docker run --rm --platform linux/arm64 -v $PWD:/workspace -w /workspace $IMAGE bash -c "\
               apt-get update && apt-get install -y binutils busybox coreutils curl file findutils grep p7zip-full patchelf sed strace wget xz-utils \
               && chmod +x ./utils2appimage.sh \
               && ./utils2appimage.sh"
          else
            docker run --rm --platform linux/amd64 -v $PWD:/workspace -w /workspace $IMAGE bash -c "\
               apt-get update && apt-get install -y binutils busybox coreutils curl file findutils grep p7zip-full patchelf sed strace wget xz-utils \
               && chmod +x ./utils2appimage.sh \
               && ./utils2appimage.sh"
          fi
          mkdir -p dist && cp ./*-static dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: static-binaries
          path: dist

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: static-binaries
          path: dist

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: get date
        run: |
          SNAPSHOT_TAG="$(date --utc +'%Y%m%d-%H%M%S')"
          echo SNAPSHOT_TAG="${SNAPSHOT_TAG}" >> "${GITHUB_ENV}"
        continue-on-error: false
      - name: release
        uses: softprops/action-gh-release@v2
        with:
            name: "Static binaries ${{env.SNAPSHOT_TAG}}"
            tag_name: "${{ env.SNAPSHOT_TAG}}"
            prerelease: false
            draft: false
            generate_release_notes: false
            make_latest: true
            files: |
              *-static
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
