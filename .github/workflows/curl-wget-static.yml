name: Build static curl & wget (stable)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [x86_64, x86, aarch64]

    env:
      CURL_VERSION: 8.19.0
      WGET_VERSION: 1.25.0
      OPENSSL_VERSION: 3.3.0

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            wget \
            curl \
            tar \
            xz-utils \
            perl \
            pkg-config \
            gcc \
            g++ \
            gcc-aarch64-linux-gnu \
            gcc-i686-linux-gnu

      - name: Set target
        run: |
          case "${{ matrix.arch }}" in
            x86_64)
              echo "TARGET=x86_64-linux-gnu" >> $GITHUB_ENV
              echo "CC=gcc" >> $GITHUB_ENV
              ;;
            x86)
              echo "TARGET=i686-linux-gnu" >> $GITHUB_ENV
              echo "CC=i686-linux-gnu-gcc" >> $GITHUB_ENV
              ;;
            aarch64)
              echo "TARGET=aarch64-linux-gnu" >> $GITHUB_ENV
              echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              ;;
          esac

      - name: Build zlib (static)
        run: |
          wget https://zlib.net/zlib-1.3.2.tar.gz
          tar xf zlib-1.3.2.tar.gz
          cd zlib-1.3.2

          CC=${CC} ./configure --static --prefix=$PWD/build
          make -j$(nproc)
          make install

          echo "ZLIB_ROOT=$PWD/build" >> $GITHUB_ENV

      - name: Build OpenSSL (static)
        run: |
          wget https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
          tar xf openssl-${OPENSSL_VERSION}.tar.gz
          cd openssl-${OPENSSL_VERSION}

          case "${{ matrix.arch }}" in
            x86_64) OPENSSL_TARGET=linux-x86_64 ;;
            x86) OPENSSL_TARGET=linux-elf ;;
            aarch64) OPENSSL_TARGET=linux-aarch64 ;;
          esac

          # NOTE: no cross-compile-prefix (more stable with GNU toolchains)
          CC=${CC} \
          ./Configure $OPENSSL_TARGET no-shared no-tests \
            --prefix=$PWD/build

          make -j$(nproc)
          make install_sw

          echo "OPENSSL_ROOT=$PWD/build" >> $GITHUB_ENV

      - name: Build curl (static)
        run: |
          wget https://curl.se/download/curl-${CURL_VERSION}.tar.gz
          tar xf curl-${CURL_VERSION}.tar.gz
          cd curl-${CURL_VERSION}

          export PKG_CONFIG_PATH="$OPENSSL_ROOT/lib/pkgconfig:$ZLIB_ROOT/lib/pkgconfig"

          CC=${CC} \
          ./configure \
            --host=${TARGET} \
            --with-openssl=$OPENSSL_ROOT \
            --with-zlib=$ZLIB_ROOT \
            --disable-shared \
            --enable-static \
            LDFLAGS="-static" \
            LIBS="-ldl -lpthread" \
            CFLAGS="-Os"

          make -j$(nproc)

          mkdir -p out/${{ matrix.arch }}
          cp src/curl out/${{ matrix.arch }}/

      - name: Build wget (static)
        run: |
          wget https://ftp.gnu.org/gnu/wget/wget-${WGET_VERSION}.tar.gz
          tar xf wget-${WGET_VERSION}.tar.gz
          cd wget-${WGET_VERSION}

          export PKG_CONFIG_PATH="$OPENSSL_ROOT/lib/pkgconfig:$ZLIB_ROOT/lib/pkgconfig"

          CC=${CC} \
          ./configure \
            --host=${TARGET} \
            --with-ssl=openssl \
            --with-libssl-prefix=$OPENSSL_ROOT \
            --with-zlib=$ZLIB_ROOT \
            --disable-shared \
            --enable-static \
            LDFLAGS="-static" \
            LIBS="-ldl -lpthread" \
            CFLAGS="-Os"

          make -j$(nproc)

          mkdir -p out/${{ matrix.arch }}
          cp src/wget out/${{ matrix.arch }}/

      - name: Strip binaries
        run: |
          strip out/${{ matrix.arch }}/* || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.arch }}
          path: out/${{ matrix.arch }}
