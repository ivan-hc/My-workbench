name: Build static curl & wget (OOM-safe i686)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: debian:bullseye-slim

    strategy:
      matrix:
        arch: [x86_64, x86, aarch64]

    env:
      CURL_VERSION: 8.19.0
      WGET_VERSION: 1.25.0
      OPENSSL_VERSION: 3.3.0

    steps:
      - name: Install toolchain
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            wget \
            curl \
            tar \
            xz-utils \
            perl \
            pkg-config \
            gcc \
            g++ \
            gcc-i686-linux-gnu \
            gcc-aarch64-linux-gnu \
            binutils-i686-linux-gnu \
            binutils-aarch64-linux-gnu \
            ca-certificates

      - name: Set toolchain
        run: |
          case "${{ matrix.arch }}" in
            x86_64)
              echo "TARGET=x86_64-linux-gnu" >> $GITHUB_ENV
              echo "CC=gcc" >> $GITHUB_ENV
              echo "OPENSSL_JOBS=2" >> $GITHUB_ENV
              ;;
            x86)
              echo "TARGET=i686-linux-gnu" >> $GITHUB_ENV
              echo "CC=i686-linux-gnu-gcc" >> $GITHUB_ENV
              echo "OPENSSL_JOBS=1" >> $GITHUB_ENV   # IMPORTANT FIX
              ;;
            aarch64)
              echo "TARGET=aarch64-linux-gnu" >> $GITHUB_ENV
              echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              echo "OPENSSL_JOBS=2" >> $GITHUB_ENV
              ;;
          esac

      - name: Build zlib (safe)
        run: |
          wget https://zlib.net/zlib-1.3.2.tar.gz
          tar xf zlib-1.3.2.tar.gz
          cd zlib-1.3.2

          CC=${CC} ./configure --static --prefix=$PWD/build
          make -j$(nproc)
          make install

          echo "ZLIB_ROOT=$PWD/build" >> $GITHUB_ENV

      - name: Build OpenSSL (OOM-safe)
        run: |
          wget https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
          tar xf openssl-${OPENSSL_VERSION}.tar.gz
          cd openssl-${OPENSSL_VERSION}

          case "${{ matrix.arch }}" in
            x86_64) OPENSSL_TARGET=linux-x86_64 ;;
            x86) OPENSSL_TARGET=linux-elf ;;
            aarch64) OPENSSL_TARGET=linux-aarch64 ;;
          esac

          CC=${CC} \
          ./Configure $OPENSSL_TARGET no-shared no-tests \
            --prefix=$PWD/build

          # 🔥 CRITICAL FIX: limit parallelism
          make -j${OPENSSL_JOBS}
          make install_sw

          echo "OPENSSL_ROOT=$PWD/build" >> $GITHUB_ENV

      - name: Build curl (unchanged safe)
        run: |
          wget https://curl.se/download/curl-${CURL_VERSION}.tar.gz
          tar xf curl-${CURL_VERSION}.tar.gz
          cd curl-${CURL_VERSION}

          export CPPFLAGS="-I$OPENSSL_ROOT/include -I$ZLIB_ROOT/include"
          export LDFLAGS="-L$OPENSSL_ROOT/lib -L$ZLIB_ROOT/lib -static"
          export LIBS="-lssl -lcrypto -lz -ldl -lpthread"

          CC=${CC} \
          ./configure \
            --host=${TARGET} \
            --with-openssl=$OPENSSL_ROOT \
            --with-zlib=$ZLIB_ROOT \
            --without-libpsl \
            --without-zstd \
            --disable-shared \
            --enable-static

          make -j$(nproc)

          mkdir -p out/${{ matrix.arch }}
          cp src/curl out/${{ matrix.arch }}/

      - name: Build wget (safe)
        run: |
          wget https://ftp.halifax.rwth-aachen.de/gnu/wget/wget-${WGET_VERSION}.tar.gz
          tar xf wget-${WGET_VERSION}.tar.gz
          cd wget-${WGET_VERSION}

          export CPPFLAGS="-I$OPENSSL_ROOT/include -I$ZLIB_ROOT/include"
          export LDFLAGS="-L$OPENSSL_ROOT/lib -L$ZLIB_ROOT/lib -static"
          export LIBS="-lssl -lcrypto -lz -ldl -lpthread"

          CC=${CC} \
          ./configure \
            --host=${TARGET} \
            --with-ssl=openssl \
            --with-libssl-prefix=$OPENSSL_ROOT \
            --with-zlib=$ZLIB_ROOT \
            --disable-shared \
            --enable-static \
            --without-libpsl \
            --disable-pcre \
            --disable-nls

          make -j1 V=1

          test -f src/wget

          mkdir -p out/${{ matrix.arch }}
          cp src/wget out/${{ matrix.arch }}/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.arch }}
          path: out/${{ matrix.arch }}
