name: JuNest Builder
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    #container:
    #  image: archlinux/archlinux:latest
    #  options: --privileged
    #  options: --user 1000:1000
    steps:
    - uses: actions/checkout@v4

    #- name: setup
    #  if: always()
    #  run: |
    #    pacman --noconfirm -Syu
    #    pacman --noconfirm -S base-devel git

    - name: build
      if: always()
      run: |
        wget https://github.com/Kron4ek/Conty/releases/download/1.27.2/conty_lite.sh
        chmod a+x ./conty_lite.sh
        ./conty_lite.sh git clone https://github.com/fsquillace/junest.git ~/.local/share/junest
        ./conty_lite.sh export PATH=~/.local/share/junest/bin:$PATH
        ./conty_lite.sh junest build -n
        mkdir dist
        mv *tar.gz dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4.4.0
      with:
        name: junest-x86_64.tar.gz
        path: 'dist'
        
  release:
      needs: [build]
      permissions: write-all
      runs-on: ubuntu-latest

      steps:
        - uses: actions/download-artifact@v4.1.8
          with:
            name: junest-x86_64.tar.gz

        - name: release
          uses: marvinpinto/action-automatic-releases@latest
          with:
            title: Continuous build
            automatic_release_tag: continuous
            prerelease: false
            draft: false
            files: |
              junest-x86_64.tar.gz
            repo_token: ${{ secrets.GITHUB_TOKEN }}

