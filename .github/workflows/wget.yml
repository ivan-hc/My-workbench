name: Build static wget (multi-arch via Alpine APKBUILD)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wget (static)
        run: |
          set -eux

          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            PLATFORM="linux/arm64"
            OUT="wget-aarch64"
          else
            PLATFORM="linux/amd64"
            OUT="wget-x86_64"
          fi

          docker run --rm \
            --platform ${PLATFORM} \
            -v "${PWD}:/work" \
            -w /work \
            alpine:latest \
            sh -euxc '
              apk add --no-cache \
                build-base \
                openssl-dev \
                zlib-dev \
                libidn2-dev \
                pcre2-dev \
                nghttp2-dev \
                autoconf \
                automake \
                libtool \
                wget \
                curl \
                git

              git clone --depth=1 https://gitlab.alpinelinux.org/alpine/aports.git
              cd aports/main/wget

              WGET_VERSION=$(grep "^pkgver=" APKBUILD | cut -d= -f2)
              echo "Using wget version: ${WGET_VERSION}"

              cd /work

              curl -LO https://ftp.gnu.org/gnu/wget/wget-${WGET_VERSION}.tar.gz
              tar xf wget-${WGET_VERSION}.tar.gz
              cd wget-${WGET_VERSION}

              ./configure \
                LDFLAGS="-static" \
                --disable-shared \
                --enable-static \
                --with-ssl=openssl

              make -j$(nproc)

              strip src/wget

              cp src/wget /work/output
            '

          mv output "${OUT}"

      - name: Verify binary
        run: |
          file wget-*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wget-static-${{ matrix.arch }}
          path: wget-*
