name: Build BusyBox (static via Alpine)

on:
  #push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, i686, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in Alpine container
        run: |
          case "${{ matrix.arch }}" in
            x86_64)
              TARGET="x86_64"
              CC="gcc"
              ;;
            i686)
              TARGET="i686"
              CC="gcc -m32"
              ;;
            aarch64)
              TARGET="aarch64"
              CC="aarch64-linux-musl-gcc"
              ;;
          esac

          docker run --rm -v $PWD:/work -w /work alpine:3.20 sh -c "
            set -eux

            apk add --no-cache \
              build-base \
              wget \
              bzip2 \
              musl-dev \
              linux-headers \
              gcc \
              make \
              binutils \
              gcc-aarch64-linux-musl

            BUSYBOX_VERSION=1.36.1
            wget https://busybox.net/downloads/busybox-\${BUSYBOX_VERSION}.tar.bz2
            tar xf busybox-\${BUSYBOX_VERSION}.tar.bz2
            cd busybox-\${BUSYBOX_VERSION}

            make defconfig

            # Enable static build
            sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config

            # Build
            make -j\$(nproc) CC=\"${CC}\"

            cp busybox /work/busybox-${TARGET}
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-${{ matrix.arch }}
          path: busybox-${{ matrix.arch }}
