name: Build BusyBox (Alpine native multi-arch)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            image: alpine:3.20
          - arch: i686
            image: i386/alpine:3.20
          - arch: aarch64
            image: arm64v8/alpine:3.20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable QEMU (for ARM)
        uses: docker/setup-qemu-action@v3

      - name: Build BusyBox
        run: |
          docker run --rm -v $PWD:/work -w /work ${{ matrix.image }} sh -c "
            set -eux

            apk add --no-cache \
              build-base \
              wget \
              bzip2 \
              linux-headers

            BUSYBOX_VERSION=1.36.1
            wget https://busybox.net/downloads/busybox-\${BUSYBOX_VERSION}.tar.bz2
            tar xf busybox-\${BUSYBOX_VERSION}.tar.bz2
            cd busybox-\${BUSYBOX_VERSION}

            make defconfig

            # Enable static build
            sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config

            # Build
            make -j\$(nproc)

            cp busybox /work/busybox-${{ matrix.arch }}
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-${{ matrix.arch }}
          path: busybox-${{ matrix.arch }}
