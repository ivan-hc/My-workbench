name: Build BusyBox (full static multi-arch)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: i686
            platform: linux/386
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build BusyBox
        run: |
          docker run --rm \
            --platform=${{ matrix.platform }} \
            -v $PWD:/work \
            -w /work \
            alpine:3.20 sh -c "
              set -eux

              apk add --no-cache \
                build-base \
                wget \
                bzip2 \
                xz \
                zstd \
                linux-headers

              BUSYBOX_VERSION=1.36.1
              wget https://busybox.net/downloads/busybox-\${BUSYBOX_VERSION}.tar.bz2
              tar xf busybox-\${BUSYBOX_VERSION}.tar.bz2
              cd busybox-\${BUSYBOX_VERSION}

              make defconfig

              # ---- CORE: static binary ----
              sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config

              # ---- ENABLE (almost) ALL APPLETS ----
              # Turn on everything that is currently off
              sed -i 's/# CONFIG_\(.*\) is not set/CONFIG_\1=y/' .config

              # ---- KEEP IMPORTANT FEATURES ----
              # Some features depend on these explicitly
              sed -i 's/.*CONFIG_FEATURE_PREFER_APPLETS.*/CONFIG_FEATURE_PREFER_APPLETS=y/' .config || true
              sed -i 's/.*CONFIG_FEATURE_SH_STANDALONE.*/CONFIG_FEATURE_SH_STANDALONE=y/' .config || true
              sed -i 's/.*CONFIG_FEATURE_SH_NOFORK.*/CONFIG_FEATURE_SH_NOFORK=y/' .config || true

              # ---- Ensure compression + archive support ----
              sed -i 's/.*CONFIG_AR.*/CONFIG_AR=y/' .config || true
              sed -i 's/.*CONFIG_TAR.*/CONFIG_TAR=y/' .config || true
              sed -i 's/.*CONFIG_GZIP.*/CONFIG_GZIP=y/' .config || true
              sed -i 's/.*CONFIG_BZIP2.*/CONFIG_BZIP2=y/' .config || true
              sed -i 's/.*CONFIG_XZ.*/CONFIG_XZ=y/' .config || true
              sed -i 's/.*CONFIG_ZSTD.*/CONFIG_ZSTD=y/' .config || true

              # ---- Fix config dependencies ----
              make oldconfig

              # ---- Build ----
              make -j\$(nproc)

              strip busybox || true

              cp busybox /work/busybox-${{ matrix.arch }}
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-${{ matrix.arch }}
          path: busybox-${{ matrix.arch }}
