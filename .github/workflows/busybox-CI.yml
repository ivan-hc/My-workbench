name: Build BusyBox (static multi-arch)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, i686, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            wget \
            bzip2 \
            musl-tools \
            gcc-multilib \
            crossbuild-essential-arm64

      - name: Download BusyBox
        run: |
          BUSYBOX_VERSION=1.36.1
          wget https://busybox.net/downloads/busybox-${BUSYBOX_VERSION}.tar.bz2
          tar xf busybox-${BUSYBOX_VERSION}.tar.bz2
          mv busybox-${BUSYBOX_VERSION} busybox

      - name: Configure toolchain
        run: |
          case "${{ matrix.arch }}" in
            x86_64)
              echo "CC=musl-gcc" >> $GITHUB_ENV
              echo "ARCH=x86_64" >> $GITHUB_ENV
              ;;
            i686)
              echo "CC=gcc -m32" >> $GITHUB_ENV
              echo "ARCH=i386" >> $GITHUB_ENV
              ;;
            aarch64)
              echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              echo "ARCH=arm64" >> $GITHUB_ENV
              ;;
          esac

      - name: Build BusyBox (static)
        run: |
          cd busybox
          make defconfig

          # Force static build
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config

          # Optional: smaller binary
          sed -i 's/.*CONFIG_FEATURE.*//g' .config || true

          make -j$(nproc) CC="${CC}"

      - name: Rename binary
        run: |
          mkdir -p out
          cp busybox/busybox out/busybox-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-${{ matrix.arch }}
          path: out/busybox-${{ matrix.arch }}
