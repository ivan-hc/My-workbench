name: portable2appimage AppImage
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  #schedule:
  #  - cron: "0 14 1/20 * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: build
      if: always()
      run: |
        sudo apt update && sudo apt install desktop-file-utils
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        chmod a+x ./portable2appimage
        ./portable2appimage portable2appimage "ivan-hc|portable2appimage|latest"
        cat portable2appimage | grep "^P2AVER" | awk -F'"' '{print $2}' > ./version
        mkdir dist
        mv *AppImage* dist/

    - name: Check version file
      run: |
       cat ./version
       echo "APP_VERSION=$(cat ./version)" >> "${GITHUB_ENV}"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4.4.3
      with:
        name: AppImage
        path: 'dist'
        
    - name: Upload version file
      uses: actions/upload-artifact@v4.4.3
      with:
       name: version
       path: ./version
        
  release:
      needs: [build]
      permissions: write-all
      runs-on: ubuntu-latest

      steps:
        - uses: actions/download-artifact@v4.1.8
          with:
            name: AppImage
        - uses: actions/download-artifact@v4.1.8
          with:
            name: version

        - name: Read version
          run: |
            cat version
            export VERSION="$(<version)"
            echo "APP_VERSION=${VERSION}" >> "${GITHUB_ENV}"
    
        - name: Continuous Releaser
          uses: softprops/action-gh-release@v2
          with:
            name: "${{ env.APP_VERSION}}"
            tag_name: "${{ env.APP_VERSION}}"
            prerelease: false
            draft: false
            generate_release_notes: false
            make_latest: true
            files: |
              *.AppImage*
          continue-on-error: false
